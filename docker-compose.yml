services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TURM_DB_PASSWORD: ${TURM_DB_PASSWORD:?Set TURM_DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./docker:/docker:ro
      - ./scripts/db:/scripts/db:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  turm:
    build: .
    environment:
      DB_PASSWORD: ${TURM_DB_PASSWORD:?Set TURM_DB_PASSWORD in .env}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
    volumes:
      - .:/go/src/turm
      - gomod_cache:/go/pkg/mod
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  gomod_cache:
